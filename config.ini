[api]
base_url = https://opendata.rdw.nl/resource/
endpoint = 8ys7-d773.json
max_retries = 3
retry_delay = 1
timeout = 10

[kenteken_patterns]
pattern1 = Kenteken:\s*([A-Z0-9]{6,7})
pattern2 = kenteken:\s*([A-Z0-9]{6,7})
pattern3 = KENTEKEN:\s*([A-Z0-9]{6,7})

[output]
excel_dir = output
log_dir = logs
max_log_size = 1048576
backup_count = 3

[versioning]
check_updates = true
version = 1.0.0
update_url = https://your-update-server.com/version.json

